AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  bot-app
  Sample SAM Template for bot-app

Globals:
  Function:
    Timeout: 3
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
Parameters:
  GeminiToken:
    Type: String
    NoEcho: true
  TelegramToken:
    Type: String
    NoEcho: true
  GroqApiKey:
    Type: String
    NoEcho: true

Resources:

  # ── Tabla DynamoDB para historial de chat ──────────────────────────
  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ChatHistory
      BillingMode: PAY_PER_REQUEST   # Sin costo fijo, pagas por uso
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: chat_id      # ID del chat de Telegram
          AttributeType: S
        - AttributeName: timestamp    # Momento del mensaje
          AttributeType: S
      KeySchema:
        - AttributeName: chat_id      # Partition key → agrupa por usuario
          KeyType: HASH
        - AttributeName: timestamp    # Sort key → ordena los mensajes
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl            # Los registros se borran solos
        Enabled: true

  # ── Lambda ────────────────────────────────────────────────────────
  BotWebhookTelegram:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: bot_webhook_telegram.app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          LOCAL: "false"
          CHAT_HISTORY_TABLE: !Ref ChatHistoryTable   # 👈 Nombre de la tabla
          HISTORY_TTL_DAYS: "30"                      # 👈 Días antes de borrar
          GEMINI_TOKEN: !Ref GeminiToken       
          TELEGRAM_TOKEN: !Ref TelegramToken    
          GROQ_API_KEY: !Ref GroqApiKey

      Policies:
        - DynamoDBCrudPolicy:                         # 👈 Permisos a la tabla
            TableName: !Ref ChatHistoryTable
      Events:
        ApiPostCode:
          Type: Api
          Properties:
            Path: /bot-webhook
            Method: post
  BotWebhookWhatsapp:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: bot_webhook_whatsapp.app.lambda_handler
      Runtime: python3.13
  
      # Environment:
      #   Variables:
      #     GEMINI_TOKEN: !Ref GeminiToken
      #     WHATSAPP_TOKEN: !Ref WhatsAppToken
      #     PHONE_NUMBER_ID: !Ref PhoneNumberId
      #     VERIFY_TOKEN: !Ref VerifyToken
      #     CHAT_HISTORY_TABLE: !Ref ChatHistoryTable
  
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatHistoryTable
  
      Events:
        Api:
          Type: Api
          Properties:
            Path: /bot-webhook-whatsapp
            Method: POST

Outputs:
  ChatHistoryTableName:
    Value: !Ref ChatHistoryTable
  ChatHistoryTableArn:
    Value: !GetAtt ChatHistoryTable.Arn