AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  bot-app
  Sample SAM Template for bot-app

Globals:
  Function:
    Timeout: 5
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - qa
      - prod
    Default: qa
  TZ:
    Type: String
    Default: America/Mazatlan
  GeminiToken:
    Type: String
    NoEcho: true
  TelegramToken:
    Type: String
    NoEcho: true
  GroqApiKey:
    Type: String
    NoEcho: true
  OpenAIToken:
    Type: String
    NoEcho: true
  GoogleServiceAccountJson:
    Type: String
    NoEcho: true
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true
  CalendarId:
    Type: String
    NoEcho: true

Resources:
  BotApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      TracingEnabled: true
      OpenApiVersion: 3.0.1

  ContactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Contacts-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: tenant
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
      KeySchema:
        - AttributeName: tenant
          KeyType: HASH
        - AttributeName: phone
          KeyType: RANGE

  BotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Bots-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bot_id
          AttributeType: S
      KeySchema:
        - AttributeName: bot_id
          KeyType: HASH

  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ChatHistoryTable-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: chat_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: chat_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  BotWebhookTelegram:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: bot_webhook_telegram.app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TZ: !Ref TZ
          LOCAL: "false"
          CHAT_HISTORY_TABLE: !Sub "ChatHistoryTable-${Environment}"
          CONTACTS_TABLE: !Sub "Contacts-${Environment}"
          BOTS_TABLE: !Sub "Bots-${Environment}"
          HISTORY_TTL_DAYS: "30"
          GEMINI_TOKEN: !Ref GeminiToken
          TELEGRAM_TOKEN: !Ref TelegramToken
          GROQ_API_KEY: !Ref GroqApiKey
          OPENAI_TOKEN: !Ref OpenAIToken
          GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
          CALENDAR_ID: !Ref CalendarId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContactsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BotsTable
      Events:
        ApiPostCode:
          Type: Api
          Properties:
            RestApiId: !Ref BotApi 
            Path: /webhook-telegram
            Method: post

  BotWebhookWhatsapp:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: bot_webhook_whatsapp.app.lambda_handler
      Runtime: python3.13
      Timeout: 15
      MemorySize: 128
      Environment:
        Variables:
          TZ: !Ref TZ
          CHAT_HISTORY_TABLE: !Sub "ChatHistoryTable-${Environment}"
          CONTACTS_TABLE: !Sub "Contacts-${Environment}"
          BOTS_TABLE: !Sub "Bots-${Environment}"
          GEMINI_TOKEN: !Ref GeminiToken
          GROQ_API_KEY: !Ref GroqApiKey
          OPENAI_TOKEN: !Ref OpenAIToken
          GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          CALENDAR_ID: !Ref CalendarId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContactsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BotsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BotApi 
            Path: /webhook-whatsapp
            Method: post

  ListEvents:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: list_events.app.lambda_handler
      Runtime: python3.13
      Environment:
        Variables:
          GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BotApi
            Path: /list-events
            Method: GET

Outputs:
  ChatHistoryTableName:
    Value: !Ref ChatHistoryTable
  ChatHistoryTableArn:
    Value: !GetAtt ChatHistoryTable.Arn
  ContactsTableName:
    Value: !Ref ContactsTable
  ContactsTableArn:
    Value: !GetAtt ContactsTable.Arn
  BotsTableName:
    Value: !Ref BotsTable
  BotsTableArn:
    Value: !GetAtt BotsTable.Arn
  TelegramWebhookUrl:
    Value: !Sub "https://${BotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhook-telegram"
  WhatsappWebhookUrl:
    Value: !Sub "https://${BotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhook-whatsapp"
  ListEventsUrl:
    Value: !Sub "https://${BotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/list-events"