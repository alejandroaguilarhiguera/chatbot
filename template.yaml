AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  bot-app
  Sample SAM Template for bot-app

Globals:
  Function:
    Timeout: 5
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Parameters:
  GeminiToken:
    Type: String
    NoEcho: true
  TelegramToken:
    Type: String
    NoEcho: true
  GroqApiKey:
    Type: String
    NoEcho: true
  OpenAIToken:
    Type: String
    NoEcho: true
  GoogleServiceAccountJson:
    Type: String
    NoEcho: true
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true


Resources:

  # ── Tabla DynamoDB para historial de chat ──────────────────────────
  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ChatHistory
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: chat_id      # Partition key
          AttributeType: S
        - AttributeName: timestamp    # Sort key
          AttributeType: S
      KeySchema:
        - AttributeName: chat_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true


  BotWebhookTelegram:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: bot_webhook_telegram.app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TZ: "America/Mazatlan"
          LOCAL: "false"
          CHAT_HISTORY_TABLE: !Ref ChatHistoryTable
          HISTORY_TTL_DAYS: "30"
          GEMINI_TOKEN: !Ref GeminiToken       
          TELEGRAM_TOKEN: !Ref TelegramToken    
          GROQ_API_KEY: !Ref GroqApiKey
          OPENAI_TOKEN: !Ref OpenAIToken
          GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatHistoryTable
      Events:
        ApiPostCode:
          Type: Api
          Properties:
            Path: /bot-webhook
            Method: post

  BotWebhookWhatsapp:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: bot_webhook_whatsapp.app.lambda_handler
      Timeout: 15
      MemorySize: 128
      Runtime: python3.13
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatHistoryTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /bot-webhook-whatsapp
            Method: post
      Environment:
        Variables:
          TZ: "America/Mazatlan"
          CHAT_HISTORY_TABLE: !Ref ChatHistoryTable
          GEMINI_TOKEN: !Ref GeminiToken       
          GROQ_API_KEY: !Ref GroqApiKey
          OPENAI_TOKEN: !Ref OpenAIToken
          GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken

  ListEvents:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: list_events.app.lambda_handler
      Runtime: python3.13
      Environment:
        Variables:
          GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
      Events:
        Api:
          Type: Api
          Properties:
            Path: /list-events
            Method: GET

Outputs:
  ChatHistoryTableName:
    Value: !Ref ChatHistoryTable
  ChatHistoryTableArn:
    Value: !GetAtt ChatHistoryTable.Arn